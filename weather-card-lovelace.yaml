# ══════════════════════════════════════════════════════════════════════════════
# Home Assistant Lovelace – Wetterkarte (Open-Meteo)
# ══════════════════════════════════════════════════════════════════════════════
#
# INSTALLATION
# ─────────────
# 1. JavaScript-Datei kopieren:
#       /config/www/weather-card-openmeteo.js
#
# 2. Ressource in Lovelace eintragen:
#    Einstellungen → Dashboards → ⋮ → Ressourcen → + Ressource hinzufügen
#       URL:  /local/weather-card-openmeteo.js
#       Typ:  JavaScript-Modul
#    (Alternativ manuell in configuration.yaml → lovelace: → resources:)
#
# 3. Dieses YAML als neue Karte im Dashboard einfügen.
#    Karte hinzufügen → Manuell (YAML) → Inhalt einsetzen.
#
# ══════════════════════════════════════════════════════════════════════════════

# ── Minimal (Standardwerte: Deutschlandsberg) ─────────────────────────────────
type: custom:weather-card-openmeteo

# ── Mit eigenen Koordinaten ───────────────────────────────────────────────────
# type: custom:weather-card-openmeteo
# location_name: Deutschlandsberg, Österreich
# lat: 46.8189
# lon: 15.0686

